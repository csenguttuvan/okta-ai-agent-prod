name: Build, Scan, and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # Build image locally for scanning (single platform for speed)
      - name: Build image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: blackstaa/okta-mcp-server:scan
          platforms: linux/amd64
          cache-from: type=registry,ref=blackstaa/okta-mcp-server:latest
      
      # 🔒 Trivy Vulnerability Scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'blackstaa/okta-mcp-server:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      # Upload results to GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      # Also show results in workflow logs
      - name: Run Trivy scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'blackstaa/okta-mcp-server:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail yet, just show results
      
      # Build and push multi-platform if scan passes
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: blackstaa/okta-mcp-server:latest
          cache-from: type=registry,ref=blackstaa/okta-mcp-server:latest
          cache-to: type=inline
      
      - name: Deployment summary
        run: |
          echo "✅ Image built and scanned"
          echo "✅ Pushed to Docker Hub"
          echo "⏳ Watchtower will deploy within 5 minutes"
          echo "📊 Check Security tab for scan results"
