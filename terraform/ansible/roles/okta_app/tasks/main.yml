---

# 1. Copy config files
- name: Copy Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ application_directory }}/docker-compose.yml"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  become: true
  notify: Restart docker compose

- name: Copy LiteLLM config
  ansible.builtin.template:
    src: litellm-config.yml.j2
    dest: "{{ application_directory }}/litellm-config.yaml"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  become: true
  notify: Restart litellm

- name: Copy custom callbacks
  ansible.builtin.copy:
    src: custom_callbacks.py
    dest: "{{ application_directory }}/custom_callbacks.py"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  become: true
  notify: Restart litellm

- name: Copy Loki config
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ application_directory }}/loki-config.yaml"
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  become: true
  notify: Restart loki

- name: Copy Alloy config
  ansible.builtin.template:
    src: alloy-config.alloy.j2
    dest: "{{ application_directory }}/alloy-config.alloy"
    owner: "473"
    group: "473"
    mode: "0644"
  become: true
  notify: Restart alloy

# 2. Start the stack
- name: Start Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ application_directory }}"
    state: present
    remove_orphans: true
  become: true
  register: compose_output

- name: Display container status
  ansible.builtin.debug:
    msg: "Docker Compose deployed successfully"