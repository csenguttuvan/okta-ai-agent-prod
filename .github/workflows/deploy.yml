name: Build, Scan, and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-mcp-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # Need at least 2 commits to compare
      
      - name: Check if MCP server files changed
        id: check_mcp
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if any files in src/okta_mcp_server changed
          if echo "$CHANGED_FILES" | grep -q '^src/okta_mcp_server/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ MCP server files changed - will build"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No MCP server changes - skipping build"
          fi
      
      - name: Set up Docker Buildx
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build MCP server image for scanning
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: blackstaa/okta-mcp-server:scan
          platforms: linux/amd64
          cache-from: type=registry,ref=blackstaa/okta-mcp-server:latest
      
      - name: Run Trivy vulnerability scanner
        if: steps.check_mcp.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'blackstaa/okta-mcp-server:scan'
          format: 'table'
          severity: 'CRITICAL'
          trivyignores: '.trivyignore'
          exit-code: '1'
      
      - name: Build and push MCP server to Docker Hub
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: blackstaa/okta-mcp-server:latest
          cache-from: type=registry,ref=blackstaa/okta-mcp-server:latest
          cache-to: type=inline
      
      - name: Deployment summary
        if: steps.check_mcp.outputs.changed == 'true'
        run: |
          echo "✅ blackstaa/okta-mcp-server:latest pushed to Docker Hub"
          echo "⏳ Watchtower will auto-deploy within 5 minutes"
        
