[defaults]
inventory = inventory/hosts.ini
host_key_checking = False
retry_files_enabled = False
roles_path = roles
stdout_callback = default
log_path = ./ansible.log
collections_paths = /home/ec2-user/.ansible/collections:/usr/share/ansible/collections


[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True