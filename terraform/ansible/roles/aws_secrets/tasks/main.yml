---
- name: Fetch Okta readonly private key
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --secret-id {{ readonly_secret_id }} \
      --region {{ aws_region }} \
      --query SecretString \
      --output text
  register: readonly_key
  no_log: true
  changed_when: false


- name: Write readonly private key
  ansible.builtin.copy:
    content: "{{ readonly_key.stdout }}"
    dest: /opt/okta-litellm/keys/readonly_private_key.pem
    owner: ec2-user
    group: ec2-user
    mode: '0600'  # ✅ tightened: private key should be 0600 not 0644
  no_log: true


- name: Fetch Okta admin private key
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --secret-id {{ admin_secret_id }} \
      --region {{ aws_region }} \
      --query SecretString \
      --output text
  register: okta_admin_key  # ✅ FIXED: was admin_key, renamed to okta_admin_key
  no_log: true
  changed_when: false


- name: Write admin private key
  ansible.builtin.copy:
    content: "{{ okta_admin_key.stdout }}"  # ✅ FIXED: updated to match new register name
    dest: /opt/okta-litellm/keys/admin_private_key.pem
    owner: ec2-user
    group: ec2-user
    mode: '0600'  # ✅ tightened: private key should be 0600 not 0644
  no_log: true


- name: Fetch Postgres database password
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --secret-id {{ rds_db_password_secret_id }} \
      --region {{ aws_region }} \
      --query SecretString \
      --output text
  register: litellm_db_password_result
  no_log: true
  changed_when: false

- name: Set DB password fact
  ansible.builtin.set_fact:
    litellm_db_password: "{{ litellm_db_password_result.stdout }}"
    rds_master_password: "{{ litellm_db_password_result.stdout }}"  # ← same secret, reused
  no_log: true


- name: Fetch LiteLLM secrets
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --secret-id {{ item.secret_id }} \
      --region {{ aws_region }} \
      --query SecretString \
      --output text
  loop:
    - { name: 'litellm_master_key', secret_id: "{{ litellm_master_secret_id }}" }
    - { name: 'litellm_admin_key', secret_id: "{{ litellm_admin_secret_id }}" }
    - { name: 'litellm_reader_key', secret_id: "{{ litellm_reader_secret_id }}" }
  register: litellm_secrets
  no_log: true
  changed_when: false
  
- name: Read GitHub App credentials from Secrets Manager
  ansible.builtin.shell: |
    aws secretsmanager get-secret-value \
      --region {{ aws_region }} \
      --secret-id {{ item.secret }} \
      --query SecretString --output text
  loop:
    - { name: app_id,             secret: "{{ github_runner_app_id_secret_id }}" }
    - { name: installation_id,    secret: "{{ github_runner_app_installation_id_secret_id }}" }
    - { name: private_key,        secret: "{{ github_runner_app_private_key_secret_id }}" }
  register: github_runner_secrets
  no_log: true 

- name: Set GitHub App credential facts
  ansible.builtin.set_fact:
    github_runner_app_id:              "{{ github_runner_secrets.results[0].stdout }}"
    github_runner_app_installation_id: "{{ github_runner_secrets.results[1].stdout }}"
    github_runner_app_private_key:     "{{ github_runner_secrets.results[2].stdout }}"
  no_log: true
  changed_when: false

- name: Create .env file from secrets
  ansible.builtin.template:
    src: env.j2
    dest: /opt/okta-litellm/.env
    owner: ec2-user  # ✅ FIXED: was root
    group: ec2-user  # ✅ FIXED: was root
    mode: '0600'     # ✅ tightened: .env contains secrets, should be 0600 not 0644
  no_log: true
