---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('ec2-user') }}"
    group: "{{ item.group | default('ec2-user') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: '/opt/okta-litellm' }
    - { path: '/opt/okta-litellm/keys', mode: '0755' }
    - { path: '/opt/okta-litellm/litellm-data' }
    - { path: '/opt/okta-litellm/loki-data', owner: '10001', group: '10001' }
    - { path: '/opt/okta-litellm/loki-wal', owner: '10001', group: '10001' }
    - { path: '/opt/okta-litellm/redis-data' }
    - { path: '/opt/okta-litellm/grafana-data', owner: '472', group: '472' }
    - { path: '/opt/okta-litellm/grafana', owner: '472', group: '472' }
    - { path: '/opt/okta-litellm/alloy-data', owner: '473', group: '473' }


- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: '472'
    group: '472'
    mode: '0755'
  loop:
    - /opt/okta-litellm/grafana/provisioning/datasources
    - /opt/okta-litellm/grafana/provisioning/dashboards

- name: Ensure Loki directories have correct ownership
  ansible.builtin.file:
    path: "{{ item }}"
    owner: '10001'
    group: '10001'
    recurse: yes
  loop:
    - /opt/okta-litellm/loki-data
    - /opt/okta-litellm/loki-wal

- name: Ensure psycopg2 is installed (required by community.postgresql)
  ansible.builtin.pip:
    name: psycopg2-binary
    state: present
  delegate_to: localhost

- name: Ensure litellm database exists on RDS
  community.postgresql.postgresql_db:
    name: "{{ litellm_db_name }}"
    state: present
    login_host: "{{ rds_host }}"
    login_user: "{{ rds_master_user }}"
    login_password: "{{ rds_master_password }}"
    encoding: UTF-8
  delegate_to: localhost
  no_log: true

- name: Ensure litellm user exists on RDS
  community.postgresql.postgresql_user:
    name: "{{ litellm_db_user }}"
    password: "{{ litellm_db_password }}"
    state: present
    login_host: "{{ rds_host }}"
    login_user: "{{ rds_master_user }}"
    login_password: "{{ rds_master_password }}"
  delegate_to: localhost
  no_log: true

- name: Grant litellm user privileges on RDS
  community.postgresql.postgresql_privs:
    database: "{{ litellm_db_name }}"
    roles: "{{ litellm_db_user }}"
    type: database
    privs: ALL
    state: present
    login_host: "{{ rds_host }}"
    login_user: "{{ rds_master_user }}"
    login_password: "{{ rds_master_password }}"
  delegate_to: localhost
  no_log: true

- name: Grant schema public privileges to litellm user
  community.postgresql.postgresql_privs:
    database: "{{ litellm_db_name }}"
    roles: "{{ litellm_db_user }}"
    type: schema
    objs: public
    privs: ALL,CREATE
    state: present
    login_host: "{{ rds_host }}"
    login_user: "{{ rds_master_user }}"
    login_password: "{{ rds_master_password }}"
  delegate_to: localhost
  no_log: true

- name: Set schema public owner to litellm user
  community.postgresql.postgresql_schema:
    name: public
    owner: "{{ litellm_db_user }}"
    database: "{{ litellm_db_name }}"
    login_host: "{{ rds_host }}"
    login_user: "{{ rds_master_user }}"
    login_password: "{{ rds_master_password }}"
  delegate_to: localhost
  no_log: true

- name: Run LiteLLM Prisma migrations
  community.docker.docker_container_exec:
    container: litellm-proxy
    command: prisma db push --schema /app/schema.prisma
  register: prisma_result
  retries: 5
  delay: 10
  until: prisma_result is not failed
