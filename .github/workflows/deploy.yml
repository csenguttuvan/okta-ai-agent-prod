name: Build, Scan, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: blackstaa/okta-mcp-server
  LITELLM_SECRET_ARN: arn:aws:secretsmanager:eu-west-3:306965385748:secret:litellm-master-key-20260128123932657700000001-p1aAwa

jobs:
  # ── Build & Scan (GitHub-hosted runner) ──────────────────────────────
  build-and-scan:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_mcp.outputs.changed }}
      short_sha: ${{ steps.tags.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if MCP server files changed
        id: check_mcp
        run: |
          CHANGED=$(git diff --name-only origin/main~1..origin/main || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q '^src/okta_mcp_server/\|^Dockerfile\|^requirements'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ No MCP changes — skipping build and deploy"
          fi

      - name: Set image tags
        if: steps.check_mcp.outputs.changed == 'true'
        id: tags
        run: |
          SHORT="${{ github.sha }}"
          echo "short_sha=${SHORT::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:scan
          platforms: linux/amd64
          no-cache: true

      - name: Run Trivy vulnerability scanner
        if: steps.check_mcp.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          severity: CRITICAL
          trivyignores: .trivyignore
          exit-code: 1

      - name: Push SHA + latest to Docker Hub
        if: steps.check_mcp.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          no-cache: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.short_sha }}


  # ── Deploy MCP image (self-hosted runner on EC2) ──────────────────────
  deploy:
    runs-on: [self-hosted, Linux, X64]
    needs: build-and-scan
    if: needs.build-and-scan.outputs.changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Save current image tag for rollback
        id: rollback
        run: |
          CURRENT=$(docker inspect okta-mcp-admin \
            --format '{{index .Config.Image}}' 2>/dev/null || echo "none")
          echo "Current running image: $CURRENT"
          echo "previous_image=$CURRENT" >> $GITHUB_OUTPUT

      - name: Pull new image
        run: |
          docker pull ${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha }}

      - name: Deploy via Docker Compose
        working-directory: /opt/okta-litellm
        run: |
          sed -i 's|image: "blackstaa/okta-mcp-server:.*"|image: "blackstaa/okta-mcp-server:${{ needs.build-and-scan.outputs.short_sha }}"|g' /opt/okta-litellm/docker-compose.yml
          echo "Updated compose file:"
          grep image /opt/okta-litellm/docker-compose.yml
          docker compose up -d --no-deps --force-recreate okta-mcp-admin okta-mcp-readonly

      - name: Wait for containers to stabilise
        run: sleep 15

      - name: Smoke test — LiteLLM proxy
        run: |
          MASTER_KEY=$(aws secretsmanager get-secret-value \
            --region eu-west-3 \
            --secret-id ${{ env.LITELLM_SECRET_ARN }} \
            --query SecretString \
            --output text)

          echo "Waiting for LiteLLM..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              -H "Authorization: Bearer $MASTER_KEY" \
              http://localhost:4002/health/readiness)
            echo "Attempt $i → HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            [ "$i" = "12" ] && { echo "❌ LiteLLM unhealthy after 60s (last status: $STATUS)"; exit 1; }
            sleep 5
          done
          echo "✅ LiteLLM healthy"

      - name: Smoke test — okta-mcp-admin
        run: |
          STATUS=$(docker inspect okta-mcp-admin --format '{{.State.Status}}')
          RESTARTS=$(docker inspect okta-mcp-admin --format '{{.RestartCount}}')
          echo "okta-mcp-admin → status=$STATUS restarts=$RESTARTS"
          [ "$STATUS" = "running" ] && [ "$RESTARTS" -eq 0 ] || {
            echo "❌ okta-mcp-admin unhealthy"
            docker logs okta-mcp-admin --tail 30
            exit 1
          }
          echo "✅ okta-mcp-admin healthy"

      - name: Smoke test — okta-mcp-readonly
        run: |
          STATUS=$(docker inspect okta-mcp-readonly --format '{{.State.Status}}')
          RESTARTS=$(docker inspect okta-mcp-readonly --format '{{.RestartCount}}')
          echo "okta-mcp-readonly → status=$STATUS restarts=$RESTARTS"
          [ "$STATUS" = "running" ] && [ "$RESTARTS" -eq 0 ] || {
            echo "❌ okta-mcp-readonly unhealthy"
            docker logs okta-mcp-readonly --tail 30
            exit 1
          }
          echo "✅ okta-mcp-readonly healthy"

      - name: Rollback to previous image
        if: failure() && steps.rollback.outputs.previous_image != 'none'
        working-directory: /opt/okta-litellm
        run: |
          echo "⚠️ Deploy failed for ${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha }}"
          echo "⏪ Rolling back to: ${{ steps.rollback.outputs.previous_image }}"
          sed -i 's|image: "blackstaa/okta-mcp-server:.*"|image: "${{ steps.rollback.outputs.previous_image }}"|g' /opt/okta-litellm/docker-compose.yml
          echo "Updated compose file:"
          grep image /opt/okta-litellm/docker-compose.yml
          docker compose up -d --no-deps --force-recreate okta-mcp-admin okta-mcp-readonly
          sleep 15

      - name: Verify rollback succeeded
        if: failure() && steps.rollback.outputs.previous_image != 'none'
        run: |
          STATUS_ADMIN=$(docker inspect okta-mcp-admin --format '{{.State.Status}}')
          STATUS_READONLY=$(docker inspect okta-mcp-readonly --format '{{.State.Status}}')
          IMAGE_ADMIN=$(docker inspect okta-mcp-admin --format '{{.Config.Image}}')
          IMAGE_READONLY=$(docker inspect okta-mcp-readonly --format '{{.Config.Image}}')
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Post-rollback status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Failed image  : ${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha }}"
          echo "  Rolled back to: ${{ steps.rollback.outputs.previous_image }}"
          echo "  admin    → status=$STATUS_ADMIN  image=$IMAGE_ADMIN"
          echo "  readonly → status=$STATUS_READONLY  image=$IMAGE_READONLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🐳 All running containers:"
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
          echo ""
          if [ "$STATUS_ADMIN" = "running" ] && [ "$STATUS_READONLY" = "running" ]; then
            echo "✅ Rollback successful — previous version restored"
          else
            echo "❌ Rollback also failed — manual intervention required"
            docker logs okta-mcp-admin --tail 30
            docker logs okta-mcp-readonly --tail 30
            exit 1
          fi

      - name: Write deploy summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_ICON="✅ Live"
            IMAGE_DEPLOYED="${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha }}"
          else
            STATUS_ICON="⚠️ Rolled back to previous"
            IMAGE_DEPLOYED="${{ steps.rollback.outputs.previous_image }}"
          fi
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`$IMAGE_DEPLOYED\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS_ICON |" >> $GITHUB_STEP_SUMMARY


  # ── Deploy config changes (self-hosted runner on EC2) ─────────────────
  deploy-config:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if custom_callbacks.py changed
        id: check_config
        run: |
          CHANGED=$(git diff --name-only origin/main~1..origin/main || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q '^terraform/ansible/roles/okta_app/files/custom_callbacks.py'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 Config changes detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ No config changes — skipping"
          fi

      - name: Copy custom_callbacks.py to LiteLLM dir
        if: steps.check_config.outputs.changed == 'true'
        run: |
          ls terraform/ansible/roles/okta_app/files/  # sanity check
          cp terraform/ansible/roles/okta_app/files/custom_callbacks.py \
            /opt/okta-litellm/custom_callbacks.py
          echo "✅ custom_callbacks.py updated"

      - name: Restart LiteLLM to pick up changes
        if: steps.check_config.outputs.changed == 'true'
        working-directory: /opt/okta-litellm
        run: |
          docker compose restart litellm
          sleep 30

      - name: Smoke test — LiteLLM healthy after restart
        if: steps.check_config.outputs.changed == 'true'
        run: |
          MASTER_KEY=$(aws secretsmanager get-secret-value \
            --region eu-west-3 \
            --secret-id ${{ env.LITELLM_SECRET_ARN }} \
            --query SecretString \
            --output text)

          echo "Waiting for LiteLLM after restart..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              -H "Authorization: Bearer $MASTER_KEY" \
              http://localhost:4002/health/readiness)
            echo "Attempt $i → HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            [ "$i" = "24" ] && { echo "❌ LiteLLM unhealthy after 120s (last status: $STATUS)"; exit 1; }
            sleep 5
          done
          echo "✅ LiteLLM healthy after config update"

      - name: Write config deploy summary
        if: steps.check_config.outputs.changed == 'true'
        run: |
          echo "## ⚙️ Config Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`custom_callbacks.py\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Live |" >> $GITHUB_STEP_SUMMARY


  # ── Deploy Terraform changes (self-hosted runner on EC2) ──────────────
  deploy-terraform:
    runs-on: [self-hosted, Linux, X64]
    needs: build-and-scan
    outputs:
      tf_changed: ${{ steps.check_tf.outputs.changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Terraform files changed
        id: check_tf
        run: |
          CHANGED=$(git diff --name-only origin/main~1..origin/main || true)
          if echo "$CHANGED" | grep -qE '^terraform/[^/]+\.tf$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🏗️ Terraform changes detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ No Terraform changes — skipping"
          fi

      - name: Setup Terraform
        if: steps.check_tf.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.0"

      - name: Terraform Init
        if: steps.check_tf.outputs.changed == 'true'
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        if: steps.check_tf.outputs.changed == 'true'
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply
        if: steps.check_tf.outputs.changed == 'true'
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Write Terraform deploy summary
        if: steps.check_tf.outputs.changed == 'true'
        run: |
          echo "## 🏗️ Terraform Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Applied |" >> $GITHUB_STEP_SUMMARY


  # ── Run Ansible provisioning (self-hosted runner on EC2) ──────────────
  deploy-ansible:
    runs-on: [self-hosted, Linux, X64]
    needs: [build-and-scan, deploy-terraform]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Ansible files or Terraform changed
        id: check_ansible
        run: |
          CHANGED=$(git diff --name-only origin/main~1..origin/main || true)
          TF_CHANGED="${{ needs.deploy-terraform.outputs.tf_changed }}"
          if echo "$CHANGED" | grep -qE '^terraform/ansible/' || [ "$TF_CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔧 Ansible provisioning required"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ No Ansible changes — skipping"
          fi

      - name: Run Ansible playbook
        if: steps.check_ansible.outputs.changed == 'true'
        working-directory: terraform/ansible
        run: |
          ansible-playbook playbook.yml \
            -i inventory/hosts.ini \
            --connection=local \
            -e "docker_image=${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha || 'latest' }}"

      - name: Write Ansible deploy summary
        if: steps.check_ansible.outputs.changed == 'true'
        run: |
          echo "## 🔧 Ansible Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE }}:${{ needs.build-and-scan.outputs.short_sha || 'latest' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Provisioned |" >> $GITHUB_STEP_SUMMARY
