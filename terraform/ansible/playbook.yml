---
- name: Configure Okta MCP + LiteLLM Server
  hosts: okta_mcp_servers
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Wait for system to be ready
      wait_for_connection:
        timeout: 300

    - name: Gather system facts
      setup:

  roles:

    - role: aws_secrets
      tags: ['secrets']

    - role: storage
      tags: ['storage']
 
    - role: okta_app
      tags: ['app']

    - role: docker
      tags: ['docker']

    - role: github_runner
      tags: ['github_runner']



  post_tasks:

    - name: Verify all containers are running
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_status
      loop:
        - okta-mcp-admin
        - okta-mcp-readonly
        - litellm-proxy
        - grafana
        - loki
        - alloy
        - litellm-redis
      failed_when: container_status.container.State.Status != "running"